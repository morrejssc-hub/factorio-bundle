name: factorio-bundle
description: Factorio automation bundle — headless server sidecar via capability

default_role: worker

environment:
  capabilities:
    - factorio_server
  envelope:
    allowed_images:
      - docker.io/factoriotools/factorio:stable

observation:
  analyzers:
    - tool_repetition
    - goal_outcome
  accumulate: 5
  cooldown_minutes: 10
