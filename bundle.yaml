name: factorio-bundle
description: Factorio automation bundle — headless server sidecar via capability

default_role: worker

roles:
  names:
    - worker
    - optimizer
    - implementer
    - auditor
  default_entry: worker
  default_exit: worker

environment:
  capabilities:
    - git
    - factorio_server
  envelope:
    allowed_images:
      - docker.io/factoriotools/factorio:stable

# Task environment fingerprint — baseline for all Factorio runs.
# Trigger payload task_env can override any field.
task_environment:
  factorio_version: "1.1.110"
  scenario: freeplay
  save:
    uri: s3://yoitsu/saves/audit/bootstrap-base-v1.zip
    digest: "sha256:6ae6d24da1cf0973a7063a970c57c0d3afea5778078ae5c152f5f829bff711aa"
    size: 630243

observation:
  analyzers:
    - tool_repetition
    - goal_outcome
  accumulate: 5
  cooldown_minutes: 10
