name: factorio-bundle
description: Factorio automation bundle — headless server sidecar via capability

roles:
  names:
    - planner
    - worker
    - optimizer
    - implementer
    - auditor
  default_entry: planner
  default_exit: worker
  capabilities:
    planner:
      - factorio_server
    worker:
      - factorio_server
    auditor:
      - factorio_server
    implementer:
      - git

environment:
  envelope:
    allowed_images:
      - docker.io/factoriotools/factorio:stable

scheduling:
  max_concurrent_jobs: 4

# Task environment fingerprint — baseline for all Factorio runs.
# Trigger payload task_env can override any field.
task_environment:
  factorio_version: "1.1.110"
  scenario: freeplay
  save:
    prefix: s3://yoitsu/saves/audit/bootstrap-base
    version: 1

observation:
  analyzers:
    - tool_repetition
    - goal_outcome
  accumulate: 5
  cooldown_minutes: 10
