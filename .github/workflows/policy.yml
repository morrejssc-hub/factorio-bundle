name: policy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protected-paths:
    name: protected-paths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block protected paths on pull requests
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          changed="$(git diff --name-only "$BASE_SHA"...HEAD)"
          printf '%s\n' "$changed"

          if printf '%s\n' "$changed" | grep -Eq '^(audit/|\.github/)'; then
            echo "::error::Protected path changed; use the manual audit path."
            exit 1
          fi

      - name: Report policy marker
        if: github.event_name != 'pull_request'
        run: echo "Protected path policy is enforced on pull requests."
